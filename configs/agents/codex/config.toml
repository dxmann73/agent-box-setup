model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"
personality = "pragmatic"

[sandbox_workspace_write]
network_access = true
writable_roots = ["/home/dave"]

[tui]
status_line = [
  "current-dir",
  "context-used",
  # Session-level token counters. Codex currently does not expose
  # a built-in "current context tokens used" numeric status item.
  "used-tokens",
  "context-window-size",
  "five-hour-limit",
  "weekly-limit",
  "model-with-reasoning",
  "total-input-tokens",
  "total-output-tokens",
]

[tui.model_availability_nux]
"gpt-5.3-codex-spark" = 4

[projects."/home/dave/projects/nomap"]
trust_level = "trusted"
