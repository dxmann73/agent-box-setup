model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
personality = "pragmatic"
approvals_reviewer = "user"

[sandbox_workspace_write]
network_access = true
writable_roots = ["/home/dave"]

[tui]
status_line = [
  "current-dir",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "model-with-reasoning",
  "total-input-tokens",
  "total-output-tokens",
]

[tui.model_availability_nux]
"gpt-5.3-codex-spark" = 4

[projects."/home/dave/projects/nomap"]
trust_level = "trusted"

[projects."/home/dave/.cursor"]
trust_level = "trusted"

[projects."/home/dave/projects/agent-box-setup"]
trust_level = "trusted"

[projects."/home/dave"]
trust_level = "trusted"

[projects."/home/dave/projects/caveman"]
trust_level = "trusted"

[notice]
hide_full_access_warning = true

[plugins."github@openai-curated"]
enabled = true

[plugins."caveman@caveman-repo"]
enabled = true

[features]
codex_hooks = true
